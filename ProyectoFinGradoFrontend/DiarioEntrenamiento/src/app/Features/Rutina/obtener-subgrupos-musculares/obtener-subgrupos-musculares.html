<div class="subgrupos-container">

  <h2 class="subgrupos-titulo">Selecciona un subgrupo muscular</h2>

  <div class="subgrupos-grid">

    @for (subgrupo of Subgrupos; track $index) {
    <!-- Subgrupo 1 -->
    <div class="subgrupo-card" (click)="ObtenerEjerciciosDe(subgrupo.id)">
      <div class="subgrupo-icono">⬆️</div>
      <h3 class="subgrupo-nombre">{{subgrupo.nombreSubgrupo}}</h3>
      <!-- <p class="subgrupo-descripcion">Enfocado en la parte clavicular del pecho.</p> -->
    </div>
    }


  </div>

</div>
