<h2 class="h4 mb-3 text-white-50">Accede a tu cuenta</h2>
<form #form="ngForm" (ngSubmit)="login()">
  <div class="mb-3">
    <label for="email" class="form-label text-white-50">Correo electrónico</label>
    <input type="email" class="form-control" id="email" [(ngModel)]="email" name="email"
           placeholder="tuemail@ejemplo.com" required autocomplete="username">
  </div>

  <div class="mb-2">
    <label for="contrasena" class="form-label text-white-50">Contraseña</label>
    <div class="input-group">
      <input [type]="pwdVisible ? 'text' : 'password'" class="form-control" id="contrasena"
             [(ngModel)]="contrasena" name="contrasena" placeholder="••••••••" required autocomplete="current-password">
  
      <button type="button" class="btn btn-outline-secondary" (click)="togglePwd()" [attr.aria-pressed]="pwdVisible">
        <i class="bi bi-eye"></i>
      </button>
  
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="remember" [(ngModel)]="remember" name="remember">
      <label class="form-check-label text-white-50" for="remember">Recordarme</label>
    </div>
    <a class="small text-decoration-none text-white-50" routerLink="/auth/forgot">¿Olvidaste tu contraseña?</a>
  </div>
@if(MensajeError){
  <div class="alert alert-danger text-center py-2">
    {{MensajeError}}
  </div>
}
  <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
    <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar
  </button>

  <div class="my-3 d-flex align-items-center gap-2 text-white-50"><span class="flex-grow-1" style="height:1px;background:rgba(255,255,255,.12)"></span>o<span class="flex-grow-1" style="height:1px;background:rgba(255,255,255,.12)"></span></div>

  <div class="d-grid gap-2">
    <button type="button" class="btn btn-outline-light" (click)="social('google')">
      <i class="bi bi-google me-2"></i>Continuar con Google
    </button>
    <button type="button" class="btn btn-outline-light" (click)="social('github')">
      <i class="bi bi-github me-2"></i>Continuar con GitHub
    </button>
  </div>

  <p class="text-center mt-3 mb-0">
    <span class="text-white-50">¿No tienes cuenta?</span>
    <a class="text-decoration-none" routerLink="/auth/registrar" routerLinkActive="active">Crear cuenta</a>
  </p>
</form>
