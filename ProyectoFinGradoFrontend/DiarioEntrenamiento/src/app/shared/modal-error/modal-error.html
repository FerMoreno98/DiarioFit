<div class="dialog-wrap">
  <h2 mat-dialog-title class="dialog-title">
    {{ data.title }}
  </h2>

  <div mat-dialog-content class="dialog-content">
    <p class="dialog-message">
      {{ data.message }}
    </p>
  </div>

  <div mat-dialog-actions class="dialog-actions" align="end">
    <button
      mat-button
      class="btn-glass"
      cdkFocusInitial
      (click)="close()"
    >
      {{ data.cancelText ?? 'Cerrar' }}
    </button>
  </div>
</div>
